<svg width="512" height="512" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Kvasir">
  <!-- Kvasir mark: a Kenaz-style chevron (torch of knowledge / code bracket / 'K')
       cut as a chisel-tapered rune with a spark, in the accent on a transparent
       field — a carved Younger-Futhark feel. -->
  <g fill="#d85a30">
    <polygon points="78,22 92,30 52,64 92,98 78,106 40,64"/>
    <rect x="63" y="57" width="14" height="14" transform="rotate(45 70 64)"/>
  </g>
</svg>
