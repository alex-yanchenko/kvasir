name: Mutation

# Mutation testing (Stryker) is slow — kept OUT of the per-PR CI job. It runs
# nightly and on demand, gating only against a regression below the configured
# `break` score (stryker.config.json), not blocking everyday pushes.
on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  mutation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm mutation
