name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm knip
      - run: pnpm type-coverage
      - run: pnpm spell
      - run: pnpm typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:coverage
      # bun:sqlite / Bun.spawn modules can't run under vitest/node — verify on Bun directly.
      # Pin the version: unpinned setup-bun resolves "latest" via GET /repos/oven-sh/bun/
      # git/refs/tags, which lists every tag on that repo and 503s independently of GitHub's
      # overall status. A pinned version is fetched by its release URL directly.
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      # Glob, not an explicit list — a new *.buntest.ts is picked up automatically
      # rather than silently skipped until someone remembers to add it here.
      - run: cd packages/mimir && bun test ./src/*.buntest.ts

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm exec size-limit

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Cache the Chromium binary across runs; --with-deps still installs the apt deps.
      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm build
      - run: pnpm exec playwright install --with-deps chromium
      # MV3 extension loading is flaky under bare --headless=new on headless Linux
      # runners; xvfb-run gives Chromium a virtual display so the loaded extension
      # reliably registers its service worker. (-a = auto-pick a free display.)
      - run: xvfb-run -a pnpm exec playwright test
