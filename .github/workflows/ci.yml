name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm knip
      - run: pnpm type-coverage
      - run: pnpm spell
      - run: pnpm typecheck
      - run: pnpm test:coverage
      # bun:sqlite store can't run under vitest/node — verify it on Bun directly.
      - uses: oven-sh/setup-bun@v2
      - run: cd packages/mimir && bun test ./src/guideStore.sqlite.buntest.ts ./src/sessionStore.sqlite.buntest.ts
      - run: pnpm build
      - run: pnpm exec size-limit

  # The real-browser e2e is too slow for the per-PR gate (chromium install). It runs
  # on push to main (post-merge) and nightly instead — see e2e.yml. `if` keeps it off
  # pull_request events; the only other trigger here is push to main.
  e2e:
    if: github.event_name == 'push'
    uses: ./.github/workflows/e2e.yml
