name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm knip
      - run: pnpm type-coverage
      - run: pnpm spell
      - run: pnpm typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:coverage
      # bun:sqlite store can't run under vitest/node — verify it on Bun directly.
      - uses: oven-sh/setup-bun@v2
      - run: cd packages/mimir && bun test ./src/guideStore.sqlite.buntest.ts ./src/sessionStore.sqlite.buntest.ts

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm exec size-limit

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Cache the Chromium binary across runs; --with-deps still installs the apt deps.
      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm build
      - run: pnpm exec playwright install --with-deps chromium
      # MV3 extension loading is flaky under bare --headless=new on headless Linux
      # runners; xvfb-run gives Chromium a virtual display so the loaded extension
      # reliably registers its service worker. (-a = auto-pick a free display.)
      - run: xvfb-run -a pnpm exec playwright test

  # Aggregate gate — the single required status check. `always()` + the explicit
  # failure check means it runs even when a dependency fails and turns red then (a
  # skipped required check would otherwise be treated as passing).
  check:
    needs: [lint, test, build, e2e]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: echo "A required CI job failed." && exit 1
      - run: echo "All CI jobs passed."
