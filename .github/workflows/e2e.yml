name: E2E

# The only real-browser smoke test: builds the extension and loads it in Chromium
# to verify the MV3 service worker registers (unit tests can't catch a boot/packaging
# regression). Slow (chromium install), so it is NOT in the per-PR gate — it runs on
# push to main (post-merge) and nightly via workflow_call.
on:
  workflow_call:

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm exec playwright install --with-deps chromium
      # MV3 extension loading is flaky under bare --headless=new on headless Linux
      # runners; xvfb-run gives Chromium a virtual display so the loaded extension
      # reliably registers its service worker. (-a = auto-pick a free display.)
      - run: xvfb-run -a pnpm exec playwright test
