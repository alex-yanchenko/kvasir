name: Release

# release-please maintains a "chore: release X.Y.Z" PR off main: it bumps every
# version file (root + extension package.json + the MV3 manifest) and writes the
# CHANGELOG from Conventional Commit messages. Merging that PR creates a DRAFT GitHub
# release; this same job then cross-compiles the channel for every supported platform
# and attaches the binaries + the built extension, so the draft is ready to ship.
# Publishing the draft (a manual click) is what creates the git tag and releases it.
on:
  push:
    branches: [main]

# Serialize releases: only one run at a time. A second push while a run is mid-flight queues
# behind it (cancel-in-progress: false) rather than racing on the release PR / draft. We do NOT
# cancel the in-progress run — killing it mid-compile could leave a half-built draft.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # Mint a short-lived installation token from the dedicated release GitHub App so PR creation
      # is scoped to THIS workflow's token — not the repo-wide "Actions can create PRs" toggle. The
      # token also makes the release PR trigger CI (PRs opened by the default GITHUB_TOKEN don't).
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # The rest runs ONLY when a release PR was just merged (a draft release now exists).
      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs.release_created }}
      - uses: oven-sh/setup-bun@v2
        if: ${{ steps.release.outputs.release_created }}
      - uses: pnpm/action-setup@v4
        if: ${{ steps.release.outputs.release_created }}
      - uses: actions/setup-node@v4
        if: ${{ steps.release.outputs.release_created }}
        with:
          node-version-file: .node-version
          cache: pnpm
      - if: ${{ steps.release.outputs.release_created }}
        run: pnpm install --frozen-lockfile
      # bun --compile resolves @kvasir/runes + mcp-sdk + zod from node_modules.
      - name: Compile channel binaries
        if: ${{ steps.release.outputs.release_created }}
        run: |
          cd packages/mimir
          mkdir -p dist
          for target in bun-darwin-arm64 bun-darwin-x64 bun-linux-x64 bun-linux-arm64; do
            bun build src/channel.ts --compile --target="$target" --outfile "dist/kvasir-channel-${target#bun-}"
          done
      # Ship the built extension as a release asset too, so a no-pnpm install can
      # download a loadable extension instead of building from source.
      - name: Build extension bundle
        if: ${{ steps.release.outputs.release_created }}
        run: |
          pnpm build
          tar -czf packages/mimir/dist/extension-dist.tgz -C packages/extension dist
      - name: Attach binaries to the draft release
        if: ${{ steps.release.outputs.release_created }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ steps.release.outputs.tag_name }}" \
            packages/mimir/dist/kvasir-channel-* packages/mimir/dist/extension-dist.tgz --clobber
      # Keep exactly one unpublished draft. Merging successive release PRs without publishing the
      # prior draft would otherwise leave a stack of stale drafts; delete every draft except the one
      # just created. Drafts carry no git tag, so this never deletes a tag or a published release.
      - name: Prune stale draft releases (keep only the new one)
        if: ${{ steps.release.outputs.release_created }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          new_tag="${{ steps.release.outputs.tag_name }}"
          gh release list --limit 100 --json tagName,isDraft \
            --jq '.[] | select(.isDraft) | .tagName' \
          | while read -r tag; do
              if [ "$tag" != "$new_tag" ]; then
                echo "Deleting stale draft $tag"
                gh release delete "$tag" --yes
              fi
            done
