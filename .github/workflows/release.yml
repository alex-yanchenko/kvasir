name: Release

# release-please maintains a "chore: release X.Y.Z" PR off main: it bumps every
# version file (root + extension package.json + the MV3 manifest) and writes the
# CHANGELOG from Conventional Commit messages. Merging that PR PUBLISHES the GitHub
# release (tag included) in the same run; this job then cross-compiles the channel
# for every supported platform and attaches the binaries + the built extension.
# draft:false is load-bearing, not convenience: a draft carries NO git tag, so the
# same run's next-release computation can't anchor on the new version and emits an
# all-history changelog — and a manually published duplicate then coexists with a
# stale empty draft under the same tag name. Accepted trade-off: the release is
# public for the few minutes between publish and `gh release upload`, so a
# download attempted in that window 404s — the installer verifies attestations
# anyway, so a partial release fails loudly rather than serving a wrong binary.
on:
  push:
    branches: [main]

# Serialize releases: only one run at a time. A second push while a run is mid-flight queues
# behind it (cancel-in-progress: false) rather than racing on the release PR. We do NOT cancel
# the in-progress run — the release publishes before the compile/attach steps, so killing it
# mid-compile would leave a live public release permanently missing its binaries.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  # Build-provenance attestation for the release assets: id-token mints the OIDC
  # identity the attestation is signed with; attestations writes it to the store the
  # installer's `gh attestation verify` checks. Lets a downloader confirm a binary
  # was built by THIS workflow, not swapped into the release afterward.
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # Mint a short-lived installation token from the dedicated release GitHub App so PR creation
      # is scoped to THIS workflow's token — not the repo-wide "Actions can create PRs" toggle. The
      # token also makes the release PR trigger CI (PRs opened by the default GITHUB_TOKEN don't).
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # The rest runs ONLY when a release PR was just merged (the release is published;
      # these steps build and attach its assets).
      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs.release_created }}
      - uses: oven-sh/setup-bun@v2
        if: ${{ steps.release.outputs.release_created }}
      - uses: pnpm/action-setup@v4
        if: ${{ steps.release.outputs.release_created }}
      - uses: actions/setup-node@v4
        if: ${{ steps.release.outputs.release_created }}
        with:
          node-version-file: .node-version
          cache: pnpm
      - if: ${{ steps.release.outputs.release_created }}
        run: pnpm install --frozen-lockfile
      # bun --compile resolves @kvasir/runes + mcp-sdk + zod from node_modules.
      - name: Compile channel binaries
        if: ${{ steps.release.outputs.release_created }}
        run: |
          cd packages/mimir
          mkdir -p dist
          for target in bun-darwin-arm64 bun-darwin-x64 bun-linux-x64 bun-linux-arm64; do
            bun build src/channel.ts --compile --target="$target" --outfile "dist/kvasir-channel-${target#bun-}"
          done
      # Ship the built extension as a release asset too, so a no-pnpm install can
      # download a loadable extension instead of building from source.
      - name: Build extension bundle
        if: ${{ steps.release.outputs.release_created }}
        run: |
          pnpm build
          tar -czf packages/mimir/dist/extension-dist.tgz -C packages/extension dist
      # Sign build provenance for every asset the installer later downloads and runs,
      # so `gh attestation verify` can prove they came from this workflow. Runs before
      # upload — it attests the artifact bytes, independent of the release itself.
      - name: Attest build provenance for the release assets
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            packages/mimir/dist/kvasir-channel-*
            packages/mimir/dist/extension-dist.tgz
      - name: Attach binaries to the release
        if: ${{ steps.release.outputs.release_created }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ steps.release.outputs.tag_name }}" \
            packages/mimir/dist/kvasir-channel-* packages/mimir/dist/extension-dist.tgz --clobber
