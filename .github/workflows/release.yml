name: Release

# Cut a release: push a tag like v0.1.0. bun cross-compiles the channel for every
# supported platform from a single runner (--target) and attaches the binaries to
# the GitHub Release; install.sh / setup.ts download the one matching the host.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  binaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
      # bun --compile resolves @kvasir/runes + mcp-sdk + zod from node_modules.
      - run: pnpm install --frozen-lockfile
      - name: Compile channel binaries
        run: |
          cd packages/mimir
          mkdir -p dist
          for target in bun-darwin-arm64 bun-darwin-x64 bun-linux-x64 bun-linux-arm64; do
            bun build src/channel.ts --compile --target="$target" --outfile "dist/kvasir-channel-${target#bun-}"
          done
      # Ship the built extension as a release asset too, so a no-pnpm install can
      # download a loadable extension instead of building from source.
      - name: Build extension bundle
        run: |
          pnpm build
          tar -czf packages/mimir/dist/extension-dist.tgz -C packages/extension dist
      - name: Publish to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" packages/mimir/dist/kvasir-channel-* packages/mimir/dist/extension-dist.tgz \
            --title "${{ github.ref_name }}" --generate-notes \
          || gh release upload "${{ github.ref_name }}" packages/mimir/dist/kvasir-channel-* packages/mimir/dist/extension-dist.tgz --clobber
